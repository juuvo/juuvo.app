<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>JUUVO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* === Home-specific === */
    html { scrollbar-gutter: auto; }
    html, body { overflow: hidden; height: 100vh; height: 100dvh; }

    .hero-section {
      position: relative;
      z-index: 1;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
    }

    .hero-headline {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: clamp(32px, 7vw, 104px);
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: #fff;
      max-width: 24ch;
      text-align: left;
    }

    .hero-headline > span {
      display: block;
      opacity: 0;
      transform: translateY(24px);
      animation: heroLineIn 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .hero-headline > span:nth-child(1) { animation-delay: 0.3s; }
    .hero-headline > span:nth-child(2) { animation-delay: 0.55s; }
    .hero-headline > span:nth-child(3) { animation-delay: 0.8s; }

    @keyframes heroLineIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-headline .brush-wrap {
      display: inline-block;
      position: relative;
      vertical-align: baseline;
    }

    .hero-headline .brush-stroke {
      position: absolute;
      left: 0;
      right: -0.25em;
      top: 100%;
      height: 0.45em;
      margin-top: -0.28em;
      pointer-events: none;
      clip-path: inset(0 100% 0 0);
      animation: brushSweep 0.6s cubic-bezier(0.4, 0, 0.2, 1) 1.1s forwards;
    }

    @keyframes brushSweep {
      to { clip-path: inset(0 0 0 0); }
    }

    .hero-headline .brush-stroke svg {
      display: block;
      width: 100%;
      height: 100%;
      transform: scaleY(-1);
    }

    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--dark-muted-2);
      text-transform: uppercase;
      animation: bounce 2s ease-in-out infinite;
    }

    .scroll-hint::after {
      content: '';
      display: block;
      width: 1px;
      height: 32px;
      background: var(--dark-muted-2);
      margin: 8px auto 0;
    }

    @keyframes bounce {
      0%, 100% { transform: translate(-50%, 0); opacity: 0.6; }
      50%      { transform: translate(-50%, 6px); opacity: 1; }
    }

    /* Philosophy (on dark bg) */
    .philosophy-dark {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 32px;
      text-align: center;
    }

    .philosophy-label {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--dark-muted);
      margin-bottom: 48px;
    }

    .philosophy-jp {
      font-family: var(--font-jp);
      font-weight: 300;
      font-size: clamp(26px, 4.2vw, 56px);
      line-height: 1.9;
      letter-spacing: 0.12em;
      color: #fff;
    }

    .philosophy-jp span { display: block; }

    .philosophy-divider {
      width: 1px;
      height: 48px;
      background: var(--dark-divider);
      margin: 40px auto;
    }

    .philosophy-about {
      max-width: 560px;
      margin: 0 auto;
    }

    .about-label {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--dark-muted-2);
      margin-bottom: 20px;
    }

    .about-text {
      font-family: var(--font-jp);
      font-weight: 300;
      font-size: clamp(15px, 1.6vw, 20px);
      line-height: 2;
      letter-spacing: 0.04em;
      color: var(--dark-text-soft);
      text-align: left;
    }

    /* Apps cards */
    .apps {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .app-card {
      background: var(--light-surface);
      border: 1px solid var(--light-border);
      padding: 28px 32px;
      display: grid;
      grid-template-columns: 52px 1fr auto;
      align-items: center;
      gap: 20px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .app-card:nth-child(1) { border-radius: 12px 12px 2px 2px; }
    .app-card:nth-child(2) { border-radius: 2px; }
    .app-card:nth-child(3) { border-radius: 2px 2px 12px 12px; }

    .app-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--light-text);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.25s ease;
    }

    .app-card:hover {
      border-color: var(--light-border-strong);
      background: var(--light-surface-hover);
    }

    .app-card:hover::before { transform: scaleY(1); }

    .app-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: var(--light-border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .app-icon img { width: 100%; height: 100%; object-fit: cover; }

    .app-info { min-width: 0; }

    .app-name {
      font-family: var(--font-mono);
      font-weight: 500;
      font-size: 14px;
      color: var(--light-text);
    }

    .app-desc {
      margin-top: 4px;
      font-size: 12px;
      color: var(--light-muted);
      line-height: 1.5;
    }

    .app-badge {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-live {
      background: var(--badge-live-bg);
      color: var(--light-text);
      border: 1px solid var(--badge-live-border);
    }

    .badge-soon {
      background: transparent;
      color: var(--light-muted);
      border: 1px solid var(--light-border);
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-headline > span { opacity: 1; transform: none; animation: none; }
      .hero-headline .brush-stroke { clip-path: none; animation: none; }
    }

    @media (max-width: 480px) {
      .app-card { grid-template-columns: 44px 1fr; padding: 20px; }
      .app-badge { display: none; }
      .app-icon { width: 44px; height: 44px; }
      .scroll-hint { bottom: 20px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="./" class="topbar-brand" aria-label="JUUVO">
      <span class="topbar-brand-logo"></span>
    </a>
    <nav class="topbar-nav">
      <a href="./">Home</a>
      <a href="about">About</a>
      <a href="apps">Apps</a>
      <a href="philosophy">Philosophy</a>
      <a href="contact">Contact</a>
    </nav>
  </header>

  <div class="dark-area">
    <div class="dark-bg">
      <div class="hero-bg"></div>
      <div class="hero-overlay"></div>
    </div>

    <section class="hero-section">
      <h1 class="hero-headline">
        <span>See deeply, strip bravely.</span>
        <span>Let the charm stand out.</span>
        <span>For those <span class="brush-wrap">who use it<span class="brush-stroke" aria-hidden="true"><svg viewBox="0 0 400 14" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><defs><filter id="brushFilter" x="-10%" y="-300%" width="120%" height="700%"><feTurbulence type="fractalNoise" baseFrequency="0.02 0.25" numOctaves="2" seed="6"/><feDisplacementMap in="SourceGraphic" scale="4"/></filter></defs><path d="M9,4 C-1,4 -1,10 9,10 C80,10 220,9 398,7 C220,5 80,4 9,4 Z" fill="#ffffff" filter="url(#brushFilter)"/></svg></span></span>.</span>
      </h1>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
