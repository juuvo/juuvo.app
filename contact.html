<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Contact — JUUVO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    main.contact-main {
      max-width: 720px;
      padding: 120px 40px 120px;
    }

    .contact-intro {
      text-align: center;
      margin-bottom: 72px;
      font-family: var(--font-jp);
      font-weight: 300;
      font-size: clamp(15px, 1.6vw, 18px);
      line-height: 2.2;
      letter-spacing: 0.06em;
      color: var(--light-text);
    }

    .contact-cta {
      text-align: center;
      padding: 80px 0;
      margin-bottom: 80px;
      border-top: 1px solid var(--light-border);
      border-bottom: 1px solid var(--light-border);
    }

    .contact-email {
      display: inline-block;
      font-family: var(--font-mono);
      font-weight: 400;
      font-size: clamp(18px, 2.6vw, 36px);
      letter-spacing: 0.01em;
      color: var(--light-text);
      text-decoration: none;
      margin-bottom: 40px;
      transition: opacity 0.2s;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .contact-email:hover { opacity: 0.55; }

    .contact-button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      background: var(--light-text);
      padding: 16px 32px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .contact-button:hover { opacity: 0.85; }
    .contact-button .arrow { transition: transform 0.2s; }
    .contact-button:hover .arrow { transform: translateX(4px); }

    @media (max-width: 560px) {
      main.contact-main { padding: 80px 24px 80px; }
      .contact-cta { padding: 56px 0 0; margin-bottom: 0; border-bottom: none; }
      .contact-intro { margin-bottom: 48px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="./" class="topbar-brand" aria-label="JUUVO">
      <span class="topbar-brand-logo"></span>
    </a>
    <nav class="topbar-nav">
      <a href="./">Home</a>
      <a href="about">About</a>
      <a href="apps">Apps</a>
      <a href="philosophy">Philosophy</a>
      <a href="contact">Contact</a>
    </nav>
  </header>

  <div class="dark-area">
    <div class="dark-bg">
      <div class="hero-bg"></div>
      <div class="hero-overlay"></div>
    </div>

    <section class="page-hero">
      <div class="page-hero-inner">
        <div class="page-label"><span class="num">05</span><span>Contact</span></div>
        <h1 class="page-title">お問い合わせ</h1>
      </div>
    </section>
  </div>

  <div class="light-area">
    <main class="contact-main">
      <p class="contact-intro">
        ご相談・ご依頼・お問い合わせは、<br>
        下記メールアドレスまでお気軽にご連絡ください。
      </p>

      <div class="contact-cta reveal">
        <a href="mailto:contact@juuvo.app" class="contact-email">contact@juuvo.app</a>
        <br>
        <a href="mailto:contact@juuvo.app" class="contact-button">
          Send email <span class="arrow">→</span>
        </a>
      </div>

    </main>

    <footer>
      © <span id="yr"></span> JUUVO
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
